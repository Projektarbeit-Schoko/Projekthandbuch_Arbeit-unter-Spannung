function rDash(){
  const items=data.filter(r=>r.parent);
  const total=items.reduce((s,r)=>s+r.kosten,0);
  const offen=items.filter(r=>r.status==="offen").length;
  const arbeit=items.filter(r=>r.status==="in Arbeit").length;
  const fertig=items.filter(r=>r.status==="fertig").length;
  const all=items.length||1;
  const pct=Math.round(fertig/all*100);
  const ms=items.filter(r=>r.ms&&r.start).sort((a,b)=>a.start.localeCompare(b.start));
  const nextMs=ms.find(m=>m.status!=="fertig");

  let h='<div class="kpi">';
  h+='<div class="kpi-card"><div class="val">'+total.toLocaleString("de-DE")+' €</div><div class="lbl">Gesamtkosten (geschätzt)</div></div>';
  h+='<div class="kpi-card"><div class="val">'+items.length+'</div><div class="lbl">Arbeitspakete</div></div>';
  h+='<div class="kpi-card"><div class="val">'+pct+'%</div><div class="lbl">Fortschritt</div></div>';
  h+='<div class="kpi-card"><div class="val" style="font-size:14px">'+(nextMs?esc(nextMs.name):"–")+'</div><div class="lbl">'+(nextMs?fmt(nextMs.start):"Nächster Meilenstein")+'</div></div>';
  h+='</div>';

  // Status bar
  h+='<h3>Status Arbeitspakete</h3>';
  h+='<div class="stacked-bar">';
  if(fertig)h+='<div class="stacked-seg" style="width:'+(fertig/all*100)+'%;background:var(--green)">'+fertig+' fertig</div>';
  if(arbeit)h+='<div class="stacked-seg" style="width:'+(arbeit/all*100)+'%;background:var(--amber)">'+arbeit+' in Arbeit</div>';
  if(offen)h+='<div class="stacked-seg" style="width:'+(offen/all*100)+'%;background:#94a3b8">'+offen+' offen</div>';
  h+='</div>';
  h+='<div style="display:flex;gap:12px;font-size:10px;color:var(--text3);margin-bottom:20px">';
  h+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:var(--green)"></span>fertig</span>';
  h+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:var(--amber)"></span>in Arbeit</span>';
  h+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#94a3b8"></span>offen</span>';
  h+='</div>';

  // Two columns
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">';

  // Cost by Bereich
  h+='<div><h3 style="margin-top:0">Kosten nach Bereich</h3>';
  const byB={};items.forEach(r=>{byB[r.bereich]=(byB[r.bereich]||0)+r.kosten;});
  const maxK=Math.max(...Object.values(byB),1);
  Object.entries(byB).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    h+='<div class="bar-chart"><div class="row"><span>'+k+'</span><span style="font-weight:600">'+v.toLocaleString("de-DE")+'€</span></div><div class="track"><div class="fill" style="width:'+(v/maxK*100)+'%"></div></div></div>';
  });
  h+='</div>';

  // Milestone timeline
  h+='<div><h3 style="margin-top:0">Meilensteine</h3><div class="ms-timeline">';
  ms.forEach((m,i)=>{
    const done=m.status==="fertig";
    h+='<div class="ms-item"><div class="ms-dot" style="background:'+(done?"var(--green)":"var(--accent)")+'"></div>';
    h+='<div><div class="ms-date">'+fmt(m.start)+'</div><div class="ms-name" style="'+(done?"text-decoration:line-through;color:var(--text3)":"")+'">'+esc(m.name)+'</div></div></div>';
    if(i<ms.length-1)h+='<div style="margin-left:4px;width:2px;height:16px;background:var(--border)"></div>';
  });
  h+='</div></div>';
  h+='</div>';

  // Heatmap
  h+='<h3>Ressourcen-Heatmap (Arbeitspakete pro Person/Monat)</h3>';
  const pItems=items.filter(r=>r.start&&r.end&&r.person);
  const personen=[...new Set(pItems.map(r=>r.person))].sort();
  const months=[];
  if(pItems.length){
    const allD=pItems.flatMap(r=>[new Date(r.start),new Date(r.end)]);
    let cur=new Date(Math.min(...allD));cur.setDate(1);
    const maxD=new Date(Math.max(...allD));
    while(cur<=maxD){months.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
  }
  h+='<div style="overflow-x:auto"><table><thead><tr><th style="background:var(--row1);color:var(--text)">Person</th>';
  months.forEach(m=>{h+='<th style="background:var(--row1);color:var(--text3);font-size:10px;text-align:center">'+m.toLocaleDateString("de-DE",{month:"short"})+'</th>';});
  h+='</tr></thead><tbody>';
  personen.forEach(p=>{
    h+='<tr><td style="font-size:11px;white-space:nowrap">'+esc(p)+'</td>';
    months.forEach(m=>{
      const mStart=m,mEnd=new Date(m.getFullYear(),m.getMonth()+1,0);
      const count=pItems.filter(r=>r.person===p&&new Date(r.start)<=mEnd&&new Date(r.end)>=mStart).length;
      const bg=count===0?"#f9fafb":count===1?"#dbeafe":count===2?"#93c5fd":count>=3?"#3b82f6":"#f9fafb";
      const col=count>=3?"white":"var(--text)";
      h+='<td><div class="heatmap-cell" style="background:'+bg+';color:'+col+'">'+count+'</div></td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';

  // Risk scatter
  h+='<h3>Risikomatrix</h3>';
  h+='<div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">';
  h+='<div style="position:relative;width:300px;height:300px;border:1px solid var(--border);border-radius:6px;background:white;overflow:hidden">';
  // Grid
  for(let x=1;x<=3;x++)for(let y=1;y<=3;y++){
    const bg=x+y>=5?"#fee2e2":x+y>=4?"#fef3c7":"#dcfce7";
    h+='<div style="position:absolute;left:'+((x-1)*100)+'px;bottom:'+((y-1)*100)+'px;width:100px;height:100px;background:'+bg+';border:1px solid rgba(0,0,0,.05)"></div>';
  }
  // Axis labels
  h+='<div style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text3)">Auswirkung →</div>';
  h+='<div style="position:absolute;left:-24px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:10px;color:var(--text3);white-space:nowrap">Wahrscheinlichkeit →</div>';
  risks.forEach((r,i)=>{
    const x=(r.auswirk-1)*100+50;const y=(r.wahrsch-1)*100+50;
    h+='<div style="position:absolute;left:'+x+'px;bottom:'+y+'px;transform:translate(-50%,-50%);z-index:2" title="'+esc(r.name)+'">';
    h+='<div style="width:24px;height:24px;border-radius:50%;background:#1e3a5f;color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600">'+(i+1)+'</div></div>';
  });
  h+='</div>';
  // Legend
  h+='<div style="font-size:11px;line-height:2">';
  risks.forEach((r,i)=>{h+='<div><b>'+(i+1)+'</b> '+esc(r.name)+'</div>';});
  h+='</div></div>';

  return h;
}

    '<label>Telefon</label><input id="mc-tel" value="'+esc(c.tel)+'">'+
    '<label>E-Mail</label><input id="mc-email" value="'+esc(c.email)+'">'+

    '<label>Stellvertreter</label><input id="mc-stv" value="'+esc(c.stellvertreter||'')+'">'+'<label>Berichtet an</label><select id="mc-reports"><option value="">– keine –</option>'+rollenOpts+'</select>'+

// ── ORGANIGRAMM ──
function rOrg(){
  let h='<p style="font-size:12px;color:var(--text3);margin-bottom:16px">Generiert sich dynamisch aus der Kontaktliste. Aendere dort Hierarchien, um das Organigramm anzupassen.</p>';
  const topNodes=contacts.filter(c=>!c.reportsTo);
  const stabNodes=topNodes.filter(c=>c.rolle.toLowerCase().includes("betriebsrat")||c.rolle.toLowerCase().includes("stab"));
  const realTop=topNodes.filter(c=>!stabNodes.includes(c));
  function getChildren(rolle){return contacts.filter(c=>c.reportsTo===rolle);}
  const BW=152,BH=58,GX=16,GY=62,PAD=30;
  const colInt="#dbeafe",colIntB="#3b82f6",colExt="#fef3c7",colExtB="#d97706";
  const colTop="#eef2ff",colTopB="#3b82f6",colL="#94a3b8";
  function layoutTree(ct,x,y){
    var children=getChildren(ct.rolle);
    var isE=ct.typ==="extern";
    var isTop=realTop.includes(ct);
    var fill=isTop?colTop:isE?colExt:colInt;
    var stroke=isTop?colTopB:isE?colExtB:colIntB;
    if(!children.length){return{nodes:[{x:x,y:y,w:BW,h:BH,name:ct.name,rolle:ct.rolle,org:ct.org||"",fill:fill,stroke:stroke,isExt:isE}],lines:[],width:BW,height:BH,cx:x+BW/2};}
    var cls=[],ctw=0;
    children.forEach(function(ch,i){var cl=layoutTree(ch,0,0);cls.push(cl);ctw+=cl.width;if(i<children.length-1)ctw+=GX;});
    var tw=Math.max(BW,ctw);
    var px=x+(tw-BW)/2,pcx=px+BW/2,cy=y+BH+GY;
    var curX=x+(tw-ctw)/2;
    var ns=[{x:px,y:y,w:BW,h:BH,name:ct.name,rolle:ct.rolle,org:ct.org||"",fill:fill,stroke:stroke,isExt:isE}];
    var ls=[];
    var jy=y+BH+GY/2;
    ls.push({x1:pcx,y1:y+BH,x2:pcx,y2:jy,d:false});
    var cxs=[];
    cls.forEach(function(cl,i){
      var ox=curX,oy=cy;
      cl.nodes.forEach(function(n){ns.push({x:n.x+ox,y:n.y+oy,w:n.w,h:n.h,name:n.name,rolle:n.rolle,org:n.org,fill:n.fill,stroke:n.stroke,isExt:n.isExt,isStab:n.isStab});});
      cl.lines.forEach(function(l){ls.push({x1:l.x1+ox,y1:l.y1+oy,x2:l.x2+ox,y2:l.y2+oy,d:l.d});});
      var ccx=cl.cx+ox;cxs.push(ccx);
      ls.push({x1:ccx,y1:jy,x2:ccx,y2:oy,d:false});
      curX+=cl.width+GX;
    });
    if(cxs.length>1)ls.push({x1:Math.min.apply(null,cxs),y1:jy,x2:Math.max.apply(null,cxs),y2:jy,d:false});
    var mxh=0;cls.forEach(function(c){if(c.height>mxh)mxh=c.height;});
    return{nodes:ns,lines:ls,width:tw,height:cy-y+mxh,cx:pcx};
  }
  var aN=[],aL=[],mW=0,mH=0;
  if(realTop.length>=1){
    var lay=layoutTree(realTop[0],PAD,PAD);
    aN=lay.nodes;aL=lay.lines;mW=lay.width+PAD*2;mH=lay.height+PAD*2;
    stabNodes.forEach(function(sn){
      var tn=aN[0];var sx=tn.x+tn.w+50;var sy=tn.y;
      aN.push({x:sx,y:sy,w:BW,h:BH,name:sn.name,rolle:sn.rolle,org:sn.org||"",fill:"#f3f4f6",stroke:"#6b7280",isExt:false,isStab:true});
      aL.push({x1:tn.x+tn.w,y1:tn.y+BH/2,x2:sx,y2:sy+BH/2,d:true});
      mW=Math.max(mW,sx+BW+PAD);
    });
    for(var ti=1;ti<realTop.length;ti++){
      var lay2=layoutTree(realTop[ti],PAD,mH+GY);
      lay2.nodes.forEach(function(n){aN.push(n);});lay2.lines.forEach(function(l){aL.push(l);});
      mW=Math.max(mW,lay2.width+PAD*2);mH=mH+GY+lay2.height;
    }
  }
  aN.forEach(function(n){mH=Math.max(mH,n.y+n.h+32+PAD);mW=Math.max(mW,n.x+n.w+PAD);});
  h+='<div style="overflow-x:auto">';
  h+='<svg width="100%" viewBox="0 0 '+mW+' '+mH+'" style="max-width:'+mW+'px;min-width:600px">';
  aL.forEach(function(l){h+='<line x1="'+l.x1+'" y1="'+l.y1+'" x2="'+l.x2+'" y2="'+l.y2+'" stroke="'+colL+'" stroke-width="1.5"'+(l.d?' stroke-dasharray="6 4"':'')+'/>';});
  aN.forEach(function(n){
    h+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="6" fill="'+n.fill+'" stroke="'+n.stroke+'" stroke-width="'+(n.isStab?"1":"1.5")+'"/>';
    if(n.isExt)h+='<rect x="'+n.x+'" y="'+(n.y+4)+'" width="3" height="'+(n.h-8)+'" rx="1.5" fill="'+colExtB+'"/>';
    h+='<text x="'+(n.x+n.w/2)+'" y="'+(n.y+20)+'" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">'+esc(n.name)+'</text>';
    h+='<text x="'+(n.x+n.w/2)+'" y="'+(n.y+34)+'" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="10" fill="#64748b">'+esc(n.rolle)+'</text>';
    if(n.org)h+='<text x="'+(n.x+n.w/2)+'" y="'+(n.y+47)+'" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#94a3b8">'+esc(n.org)+'</text>';
    if(n.isStab)h+='<text x="'+(n.x+n.w/2)+'" y="'+(n.y-5)+'" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#6b7280" font-style="italic">Stabsstelle</text>';
    // Stellvertreter sub-node
    var ctMatch=contacts.find(function(c){return c.rolle===n.rolle;});
    if(ctMatch&&ctMatch.stellvertreter){
      var svY=n.y+n.h+4;
      h+='<line x1="'+(n.x+n.w/2)+'" y1="'+(n.y+n.h)+'" x2="'+(n.x+n.w/2)+'" y2="'+svY+'" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>';
      h+='<rect x="'+(n.x+10)+'" y="'+svY+'" width="'+(n.w-20)+'" height="22" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.5"/>';
      h+='<text x="'+(n.x+n.w/2)+'" y="'+(svY+14)+'" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="9" fill="#64748b">Stv: '+esc(ctMatch.stellvertreter)+'</text>';
    }
  });
  h+='</svg></div>';
  h+='<div style="display:flex;gap:16px;margin-top:14px;font-size:11px;color:var(--text3);flex-wrap:wrap">';
  h+='<span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:12px;border-radius:3px;background:'+colInt+';border:1px solid '+colIntB+'"></span>Intern</span>';
  h+='<span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:12px;border-radius:3px;background:'+colExt+';border:1px solid '+colExtB+';border-left:3px solid '+colExtB+'"></span>Extern</span>';
  h+='<span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:12px;border-radius:3px;background:#f3f4f6;border:1px solid #6b7280"></span>Stabsstelle</span>';
  h+='<span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:8px;border-radius:2px;background:#f8fafc;border:1px solid #cbd5e1"></span>Stellvertreter</span>';
  h+='<span style="display:flex;align-items:center;gap:5px"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#94a3b8" stroke-width="1.5"/></svg>Linie</span>';
  h+='<span style="display:flex;align-items:center;gap:5px"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/></svg>Stab</span>';
  h+='</div>';
  return h;
}

  let h='<p style="font-size:12px;color:var(--text3);margin-bottom:14px">Klicke auf einen Steckbrief zum Bearbeiten.</p>';
  roles.forEach((rd,i)=>{
    const p=personForRole(rd.rolle);
    const count=data.filter(r=>r.parent&&r.verantw===rd.rolle).length;

// ── KOMMUNIKATIONSMATRIX ──
function rKomm(){
  const rollen=contacts.map(c=>c.rolle);
  const matrix={};rollen.forEach(a=>{matrix[a]={};rollen.forEach(b=>{matrix[a][b]="";});});
  // From contacts: reportsTo + informedBy
  contacts.forEach(c=>{
    if(c.reportsTo&&matrix[c.rolle]&&matrix[c.rolle][c.reportsTo]!==undefined)matrix[c.rolle][c.reportsTo]="berichtet";
    if(c.reportsTo&&matrix[c.reportsTo]&&matrix[c.reportsTo][c.rolle]!==undefined)matrix[c.reportsTo][c.rolle]="steuert";
    (c.informedBy||[]).forEach(from=>{if(matrix[from]&&matrix[from][c.rolle]!==undefined)matrix[from][c.rolle]="informiert";});
  });
  // From RACI
  data.filter(r=>r.parent).forEach(row=>{
    if(row.rR&&row.rC&&matrix[row.rR]&&matrix[row.rR][row.rC]!==undefined&&!matrix[row.rR][row.rC])matrix[row.rR][row.rC]="konsultiert";
  });

  let h='<p style="font-size:12px;color:var(--text3);margin-bottom:12px">Abgeleitet aus Kontaktliste (Berichtet an, Wird informiert von) und RACI-Zuordnungen.</p>';
  h+='<div style="overflow-x:auto"><table style="min-width:600px"><thead><tr class="tbl-head"><th style="min-width:120px">Von \\ An</th>';
  rollen.forEach(r=>{h+='<th style="writing-mode:vertical-rl;height:90px;font-size:9px;text-align:center;padding:4px 2px;white-space:nowrap">'+esc(r)+'</th>';});
  h+='</tr></thead><tbody>';
  rollen.forEach((from,i)=>{
    const c=contacts.find(x=>x.rolle===from);
    h+='<tr style="border-bottom:1px solid var(--border)"><td style="font-size:11px;font-weight:600;background:var(--row1);padding:4px 6px">'+esc(from)+'<br><span style="font-weight:400;color:var(--text3);font-size:10px">'+esc(c?c.name:"")+'</span></td>';
    rollen.forEach(to=>{
      if(from===to){h+='<td class="comm-cell" style="background:#e2e8f0">—</td>';}
      else{const val=matrix[from]?.[to]||"";h+='<td class="comm-cell '+(val?"comm-yes":"comm-no")+'">'+(val||"·")+'</td>';}
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  h+='<div style="margin-top:12px;font-size:11px;display:flex;gap:10px;flex-wrap:wrap">';
  h+=badge("berichtet","blue")+" R → A &nbsp;";
  h+=badge("steuert","red")+" A → R &nbsp;";
  h+=badge("konsultiert","amber")+" R → C &nbsp;";
  h+=badge("informiert","gray")+" → I";
  h+='</div>';
  return h;
}

function addPSPRow(parentId){
  const existing=data.map(r=>r.psp).filter(p=>!p.includes(".")).map(Number).filter(n=>!isNaN(n));
  const nextNum=existing.length?Math.max(...existing)+1:1;
  const newId=String(nextNum);
  data.push({id:newId,psp:newId,name:"Neue Hauptgruppe",parent:"",lph:"",bereich:"",verantw:"",person:"",ext:"intern",start:"",end:"",dauer:"",vorg:"",kosten:0,rR:"",rA:"",rC:"",rI:"",status:"offen",ms:false,note:"",ziele:"",aufgaben:"",beteiligte:"",ergebnis:"",ressource:"",aufwand_h:0,auslastung:0});
  save(SK.data,data);render();showToast("Hauptgruppe "+newId+" hinzugefuegt");
}

function addPSPSub(){
  const parents=data.filter(r=>!r.parent);
  if(!parents.length){addPSPRow("");return;}
  let opts='';parents.forEach(p=>{opts+='<option value="'+p.id+'">'+p.psp+' – '+esc(p.name)+'</option>';});
  showModal("Arbeitspaket hinzufuegen",'<label>Übergeordnete Gruppe</label><select id="ap-parent">'+opts+'</select><label>Bezeichnung</label><input id="ap-name" value="Neues Arbeitspaket">',function(){
    const pid=document.getElementById("ap-parent").value;
    const pName=document.getElementById("ap-name").value;
    const siblings=data.filter(r=>r.parent===pid);
    const nums=siblings.map(r=>{const parts=r.psp.split(".");return parts.length>1?Number(parts[parts.length-1]):0;}).filter(n=>!isNaN(n));
    const nextSub=nums.length?Math.max(...nums)+1:1;
    const newPsp=pid+"."+nextSub;
    data.push({id:newPsp,psp:newPsp,name:pName,parent:pid,lph:"",bereich:"",verantw:"",person:"",ext:"intern",start:"",end:"",dauer:"",vorg:"",kosten:0,rR:"",rA:"",rC:"",rI:"",status:"offen",ms:false,note:"",ziele:"",aufgaben:"",beteiligte:"",ergebnis:"",ressource:"",aufwand_h:0,auslastung:0});
    save(SK.data,data);closeModal();render();showToast("AP "+newPsp+" hinzugefuegt");
  });
}

function delPSP(id){
  const row=data.find(r=>r.id===id);if(!row)return;
  const children=data.filter(r=>r.parent===id);
  const msg=children.length?"Gruppe "+row.psp+" und "+children.length+" Unterpunkte löschen?":"AP "+row.psp+" löschen?";
  if(!confirm(msg))return;
  const toRemove=new Set([id,...children.map(c=>c.id)]);
  data=data.filter(r=>!toRemove.has(r.id));
  save(SK.data,data);render();showToast("Gelöscht");
}

function exportCSV(){
  const sep=";";
  const h=["PSP-Nr.","Bezeichnung","Ziele","Aufgaben","Rolle","Verantwortliche Person","Beteiligte Personen","Leistungsphase","Gewerk/Bereich","Intern/Extern","Start","Ende","Dauer (AT)","Vorgänger","Kosten (EUR)","Ressource","Aufwand (Std.)","Auslastung (%)","RACI-R","RACI-A","RACI-C","RACI-I","Status","Meilenstein","Ergebnis/Dokument","Anmerkungen"];
  function csvVal(v){v=String(v==null?"":v);if(v.indexOf(sep)>=0||v.indexOf('"')>=0||v.indexOf('\n')>=0)return'"'+v.replace(/"/g,'""')+'"';return v;}
  let csv=h.join(sep)+"\n";
  data.forEach(r=>{csv+=[r.psp,r.name,r.ziele||"",r.aufgaben||"",r.verantw,r.person,r.beteiligte||"",r.lph,r.bereich,r.ext,fmt(r.start),fmt(r.end),r.dauer,r.vorg,r.kosten,r.ressource||"",r.aufwand_h||0,r.auslastung||0,r.rR,r.rA,r.rC,r.rI,r.status,r.ms?"ja":"nein",r.ergebnis||"",r.note].map(csvVal).join(sep)+"\n";});
  const b=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="psp_airtable_export.csv";a.click();
  showToast("CSV für Airtable exportiert");
}

// ── GANTT ──
function rGantt(){
  var items=data.filter(function(r){return r.start&&r.end&&r.parent;});
  if(!items.length)return'<p>Keine Daten.</p>';
  var dates=items.flatMap(function(r){return[new Date(r.start),new Date(r.end)];});
  var minD=new Date(Math.min.apply(null,dates)),maxD=new Date(Math.max.apply(null,dates));
  var td=Math.max(1,(maxD-minD)/864e5);

  // View state
  if(!window._ganttView)window._ganttView='detail';
  var view=window._ganttView;

  var h='<div style="display:flex;gap:6px;margin-bottom:14px;align-items:center">';
  h+='<button class="btn btn-sm'+(view==='detail'?' ':' btn-sec ')+'" onclick="window._ganttView=\'detail\';render()">Detailansicht</button>';
  h+='<button class="btn btn-sm'+(view==='übersicht'?' ':' btn-sec ')+'" onclick="window._ganttView=\'übersicht\';render()">Gruppenansicht</button>';
  h+='<span style="font-size:10px;color:var(--text3);margin-left:8px">'+(view==='detail'?'Alle Arbeitspakete einzeln':'Gruppiert nach PSP-Hauptgruppen')+'</span>';
  h+='</div>';

  // Month headers
  var months=[];
  var cur=new Date(minD.getFullYear(),minD.getMonth(),1);
  while(cur<=maxD){months.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}

  var labelW=220;
  var rowH=view==='detail'?28:56;

  h+='<div style="overflow-x:auto"><div style="min-width:850px">';

  // Month header bar
  h+='<div style="display:flex;margin-left:'+labelW+'px;border-bottom:2px solid var(--border);margin-bottom:2px">';
  months.forEach(function(m){
    var mEnd=new Date(m.getFullYear(),m.getMonth()+1,0);
    var mDays=(Math.min(mEnd,maxD)-Math.max(m,minD))/864e5;
    h+='<div style="width:'+(mDays/td*100)+'%;font-size:11px;color:var(--text2);padding:6px 0;font-weight:600;border-left:1px solid var(--border)">'+m.toLocaleDateString("de-DE",{month:"long",year:"numeric"})+'</div>';
  });
  h+='</div>';

  // Week gridlines (subtle)
  h+='<div style="position:relative">';

  if(view==='detail'){
    // ── DETAIL VIEW ──
    var groups=[];var groupMap={};
    data.forEach(function(r){
      if(!r.parent){groups.push({id:r.psp,name:r.name,items:[]});}
    });
    items.forEach(function(r){
      var gid=r.psp.split('.')[0];
      var g=groups.find(function(x){return x.id===gid;});
      if(g)g.items.push(r);
    });

    groups.forEach(function(g){
      if(!g.items.length)return;
      // Group header
      h+='<div style="display:flex;align-items:center;height:32px;background:#f1f5f9;border-bottom:1px solid var(--border);margin-top:6px">';
      h+='<div style="width:'+labelW+'px;flex-shrink:0;font-size:12px;font-weight:700;color:var(--text);padding:0 8px">'+esc(g.id)+' '+esc(g.name)+'</div>';
      h+='<div style="flex:1;position:relative;height:100%">';
      // Group span bar (light background)
      var gStarts=g.items.map(function(r){return new Date(r.start);});
      var gEnds=g.items.map(function(r){return new Date(r.end);});
      var gLeft=(Math.min.apply(null,gStarts)-minD)/864e5/td*100;
      var gRight=(Math.max.apply(null,gEnds)-minD)/864e5/td*100;
      h+='<div style="position:absolute;left:'+gLeft+'%;width:'+(gRight-gLeft)+'%;height:100%;background:rgba(59,130,246,0.06);border-left:2px solid var(--accent);border-right:2px solid var(--accent)"></div>';
      h+='</div></div>';

      // Items
      g.items.forEach(function(row){
        var s=new Date(row.start),e=new Date(row.end);
        var left=(s-minD)/864e5/td*100;
        var width=Math.max(0.8,(e-s)/864e5/td*100);
        var isKrit=row.kritisch;
        var color=isKrit?'#dc2626':row.lph.includes("0")?"#6366f1":row.lph.includes("1")?"#3b82f6":"#10b981";
        var barStyle='left:'+left+'%;width:'+width+'%;background:'+color+';';
        if(isKrit)barStyle+='box-shadow:0 0 0 2px rgba(220,38,38,0.3);';
        if(row.ms&&(!row.dauer||row.dauer==='0'||row.dauer==='1'))barStyle+='width:12px;border-radius:2px;background:'+color+';';

        h+='<div style="display:flex;align-items:center;height:'+rowH+'px;border-bottom:1px solid rgba(226,232,240,0.5)">';
        h+='<div style="width:'+labelW+'px;flex-shrink:0;font-size:11px;color:'+(isKrit?'var(--red)':'var(--text2)')+';padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:'+(isKrit?'600':'400')+'">';
        h+='<span style="color:var(--text4);margin-right:3px;font-weight:400">'+row.psp+'</span>'+esc(row.name);
        if(isKrit)h+=' <span style="font-size:8px;color:var(--red);vertical-align:middle">●</span>';
        h+='</div>';
        h+='<div style="flex:1;position:relative;height:100%;display:flex;align-items:center">';
        h+='<div style="position:absolute;'+barStyle+'height:'+(rowH-10)+'px;border-radius:3px;display:flex;align-items:center;padding-left:4px;font-size:9px;color:white;font-weight:500;overflow:hidden;white-space:nowrap">';
        h+=(row.ms?'◆ ':'')+(width>10?fmt(row.start)+' – '+fmt(row.end):'');
        h+='</div>';
        // Dependency arrow hint
        if(row.vorg){
          var pred=items.find(function(p){return p.psp===row.vorg;});
          if(pred){
            var predEnd=(new Date(pred.end)-minD)/864e5/td*100;
            if(predEnd<left){
              h+='<div style="position:absolute;left:'+(predEnd)+'%;width:'+(left-predEnd)+'%;height:1px;top:50%;border-top:1px '+(isKrit?'solid var(--red)':'dashed var(--text4)')+'"></div>';
            }
          }
        }
        h+='</div></div>';
      });
    });

  } else {
    // ── OVERVIEW VIEW ──
    var groups2=[];
    data.forEach(function(r){
      if(!r.parent){
        var gItems=items.filter(function(x){return x.psp.split('.')[0]===r.psp;});
        if(gItems.length)groups2.push({id:r.psp,name:r.name,items:gItems});
      }
    });

    groups2.forEach(function(g){
      var gStarts=g.items.map(function(r){return new Date(r.start);});
      var gEnds=g.items.map(function(r){return new Date(r.end);});
      var gStart=new Date(Math.min.apply(null,gStarts));
      var gEnd=new Date(Math.max.apply(null,gEnds));
      var left=(gStart-minD)/864e5/td*100;
      var width=Math.max(1,(gEnd-gStart)/864e5/td*100);
      var hasKrit=g.items.some(function(r){return r.kritisch;});
      var ms=g.items.filter(function(r){return r.ms;});
      var totalK=g.items.reduce(function(s,r){return s+r.kosten;},0);
      var color=hasKrit?'#dc2626':'#3b82f6';

      h+='<div style="display:flex;align-items:center;height:'+rowH+'px;border-bottom:1px solid var(--border);background:'+(hasKrit?'#fef2f2':'white')+'">';
      h+='<div style="width:'+labelW+'px;flex-shrink:0;padding:0 8px">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--text)">'+esc(g.id)+' '+esc(g.name)+'</div>';
      h+='<div style="font-size:9px;color:var(--text3)">'+g.items.length+' AP · '+fmt(gStart.toISOString().split("T")[0])+' – '+fmt(gEnd.toISOString().split("T")[0])+(totalK>0?' · '+totalK.toLocaleString("de-DE")+'€':'')+'</div>';
      h+='</div>';
      h+='<div style="flex:1;position:relative;height:100%;display:flex;align-items:center;overflow:hidden">';
      // Main group bar
      h+='<div style="position:absolute;left:'+left+'%;width:'+width+'%;height:28px;background:'+color+';opacity:0.12;border-radius:4px;top:6px"></div>';
      h+='<div style="position:absolute;left:'+left+'%;width:'+width+'%;height:4px;background:'+color+';border-radius:2px;top:18px"></div>';
      // Milestone diamonds
      ms.forEach(function(m){
        var mLeft=(new Date(m.start)-minD)/864e5/td*100;
        h+='<div style="position:absolute;left:'+mLeft+'%;width:10px;height:10px;background:'+color+';transform:rotate(45deg) translateX(-50%);top:13px;border-radius:1px" title="'+esc(m.name)+' ('+fmt(m.start)+')"></div>';
      });
      // Individual items as thin bars
      g.items.forEach(function(row){
        var s=new Date(row.start),e=new Date(row.end);
        var iLeft=(s-minD)/864e5/td*100;
        var iWidth=Math.max(0.5,(e-s)/864e5/td*100);
        var iColor=row.kritisch?'#dc2626':row.lph.includes("0")?"#6366f1":row.lph.includes("1")?"#3b82f6":"#10b981";
        h+='<div style="position:absolute;left:'+iLeft+'%;width:'+iWidth+'%;height:5px;background:'+iColor+';border-radius:1px;top:38px;opacity:0.6" title="'+row.psp+' '+esc(row.name)+'"></div>';
      });
      h+='</div></div>';
    });
  }

  h+='</div>';

  // Legend
  h+='</div></div>';
  h+='<div style="display:flex;gap:14px;margin-top:16px;padding:10px 0;flex-wrap:wrap;font-size:11px;color:var(--text3);border-top:1px solid var(--border)">';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:14px;height:8px;background:#6366f1;border-radius:2px"></span>LPH 0</span>';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:14px;height:8px;background:#3b82f6;border-radius:2px"></span>LPH 1</span>';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:14px;height:8px;background:#10b981;border-radius:2px"></span>LPH 2</span>';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:14px;height:8px;background:#dc2626;border-radius:2px;box-shadow:0 0 0 2px rgba(220,38,38,0.3)"></span>Kritischer Pfad</span>';
  h+='<span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:#1e3a5f;transform:rotate(45deg);border-radius:1px"></span> Meilenstein</span>';
  h+='</div>';
  return h;
}

// ── KOSTEN ──
function rKosten(){
  const items=data.filter(r=>r.parent);const total=items.reduce((s,r)=>s+r.kosten,0);
  const byB={};items.forEach(r=>{byB[r.bereich]=(byB[r.bereich]||0)+r.kosten;});const maxK=Math.max(...Object.values(byB),1);
  let h='<div class="kpi" style="grid-template-columns:1fr 1fr 1fr"><div class="kpi-card"><div class="val">'+total.toLocaleString("de-DE")+' €</div><div class="lbl">Gesamt</div></div>';
  const byL={};items.forEach(r=>{byL[r.lph]=(byL[r.lph]||0)+r.kosten;});
  Object.entries(byL).filter(([,v])=>v>0).forEach(([k,v])=>{h+='<div class="kpi-card"><div class="val" style="font-size:18px;color:var(--text)">'+v.toLocaleString("de-DE")+' €</div><div class="lbl">'+k+'</div></div>';});
  h+='</div><h3>Nach Bereich</h3>';
  Object.entries(byB).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{h+='<div class="bar-chart"><div class="row"><span>'+k+'</span><span style="font-weight:600">'+v.toLocaleString("de-DE")+' €</span></div><div class="track"><div class="fill" style="width:'+(v/maxK*100)+'%"></div></div></div>';});
  h+='<h3>Einzelpositionen</h3><table><thead><tr style="background:#f1f5f9"><th style="color:var(--text3)">PSP</th><th style="color:var(--text3)">Bezeichnung</th><th style="color:var(--text3)">Person</th><th style="color:var(--text3);text-align:right">Kosten</th></tr></thead><tbody>';
  items.filter(r=>r.kosten>0).sort((a,b)=>b.kosten-a.kosten).forEach(r=>{h+='<tr style="border-bottom:1px solid #f1f5f9"><td style="color:var(--text4)">'+r.psp+'</td><td>'+esc(r.name)+'</td><td style="font-size:11px">'+esc(r.person)+'</td><td style="font-weight:600;text-align:right">'+r.kosten.toLocaleString("de-DE")+' €</td></tr>';});
  h+='</tbody></table>';return h;
}

// ── RISIKEN ──

function editRisk(i){

    '<label>Wahrscheinlichkeit (1-3)</label><select id="rr-w"><option value="1" '+(r.wahrsch===1?"selected":"")+'>1 – gering</option><option value="2" '+(r.wahrsch===2?"selected":"")+'>2 – mittel</option><option value="3" '+(r.wahrsch===3?"selected":"")+'>3 – hoch</option></select>'+
    '<label>Auswirkung (1-3)</label><select id="rr-a"><option value="1" '+(r.auswirk===1?"selected":"")+'>1 – gering</option><option value="2" '+(r.auswirk===2?"selected":"")+'>2 – mittel</option><option value="3" '+(r.auswirk===3?"selected":"")+'>3 – hoch</option></select>'+
    '<label>Gegenmaßnahme</label><textarea id="rr-m" rows="2">'+esc(r.maßnahme)+'</textarea>';
  showModal("Risiko bearbeiten",body,()=>{
    r.name=document.getElementById("rr-name").value;r.wahrsch=Number(document.getElementById("rr-w").value);

  var imgName=localStorage.getItem('grundriss_name_'+VER)||'';
  if(imgData){
    h+='<div style="margin-bottom:12px;padding:10px;background:white;border:1px solid var(--border);border-radius:6px">';

    h+='<span style="font-size:12px;font-weight:600">'+esc(imgName)+'</span>';
    h+='<button class="btn btn-sm btn-danger" onclick="removeGrundriss()">Entfernen</button></div>';

      h+='<iframe src="'+imgData+'" style="width:100%;height:600px;border:1px solid var(--border);border-radius:4px"></iframe>';

    }
    h+='</div>';
  }
  h+='<div id="grundriss-drop" style="border:2px dashed var(--border);border-radius:8px;padding:40px;text-align:center;cursor:pointer;background:white" onclick="document.getElementById(\'grundriss-input\').click()" ondragover="event.preventDefault();this.style.borderColor=\'#3b82f6\'" ondragleave="this.style.borderColor=\'#e2e8f0\'" ondrop="handleGrDrop(event)">';
  h+='<div style="font-size:14px;color:var(--text2);margin-bottom:4px">'+(imgData?'Neues Bild hochladen':'Bild hier ablegen oder klicken')+'</div>';
  h+='<div style="font-size:11px;color:var(--text4)">PNG, JPG oder PDF</div>';
  h+='<input type="file" id="grundriss-input" accept="image/png,image/jpeg,application/pdf" style="display:none" onchange="handleGrFile(this.files[0])">';
  h+='</div>';

  h+='<div style="font-size:13px;color:var(--text2);line-height:1.8">';
  h+='1. Grundriss als PNG, JPG oder PDF exportieren (z.B. aus CAD, Allplan, Revit)<br>';
  h+='2. Datei hierher ziehen oder auf die Box klicken<br>';
  h+='3. Das Bild wird lokal gespeichert und erscheint oben<br>';
  h+='4. Bei "Projekt als HTML speichern" wird das Bild mit eingebettet</div>';

}
function handleGrFile(file){
  if(!file)return;
  if(file.size>5*1024*1024){showToast('Datei zu gross (max 5 MB)');return;}
  var reader=new FileReader();
  reader.onload=function(e){localStorage.setItem('grundriss_img_'+VER,e.target.result);localStorage.setItem('grundriss_name_'+VER,file.name);showToast('Grundriss gespeichert');render();};

  h+='<h3>'+title+'</h3>'+body;

}
